{% extends "base.html" %}

{% block content %}
<div class="banner warn" id="dry-banner" style="display:none">⚠ DRY RUN is ON — entries are simulated, no real orders are placed.</div>

<div class="card">
  <div class="card-hd">Trading Mode</div>
  <div class="card-bd form-grid">
    <label class="fld"><span>Mode</span>
      <select id="c-DRY_RUN" onchange="dryBanner()">
        <option value="false">LIVE — real orders</option>
        <option value="true">DRY RUN — simulate</option>
      </select>
    </label>
    <label class="fld"><span>Max trades / day</span><input id="c-MAX_TRADES_PER_DAY" type="number" min="1" max="10"></label>
    <label class="fld"><span>Dynamic lot sizing</span>
      <select id="c-DYNAMIC_LOTS"><option value="true">ON — max(configured, affordable)</option><option value="false">OFF — configured lots only</option></select>
    </label>
    <label class="fld"><span>Strike step $</span><input id="c-STRIKE_STEP" type="number" min="50"></label>
  </div>
</div>

<div class="grid cols-2">
  <div class="card">
    <div class="card-hd">🌅 Morning Slot</div>
    <div class="card-bd form-grid two">
      <label class="fld"><span>Enabled</span>
        <select id="c-MORNING_ENABLED"><option value="true">Yes</option><option value="false">No</option></select>
      </label>
      <label class="fld"><span>Lots</span><input id="c-MORNING_LOTS" type="number" min="1" max="5000"></label>
      <label class="fld"><span>Entry time (IST)</span><input id="t-morning-entry" type="time" step="60"></label>
      <label class="fld"><span>Exit time (IST)</span><input id="t-morning-exit" type="time" step="60"></label>
      <label class="fld"><span>Scheduled exit</span>
        <select id="c-MORNING_EXIT_ENABLED"><option value="true">Enabled</option><option value="false">Disabled (TP/settlement only)</option></select>
      </label>
      <label class="fld"><span>&nbsp;</span><span class="hint" style="display:block;padding:9px 0" id="utc-morning"></span></label>
      <label class="fld"><span>TP target $</span><input id="c-TP_TARGET_PNL_MORNING" type="number"></label>
      <label class="fld"><span>TP poll secs</span><input id="c-TP_POLL_SECS_MORNING" type="number" min="10"></label>
    </div>
  </div>

  <div class="card">
    <div class="card-hd">🌇 Evening Slot</div>
    <div class="card-bd form-grid two">
      <label class="fld"><span>Lots</span><input id="c-STRADDLE_LOTS" type="number" min="1" max="5000"></label>
      <label class="fld"><span>&nbsp;</span><span></span></label>
      <label class="fld"><span>Entry time (IST)</span><input id="t-evening-entry" type="time" step="60"></label>
      <label class="fld"><span>Exit time (IST)</span><input id="t-evening-exit" type="time" step="60"></label>
      <label class="fld"><span>TP target $</span><input id="c-TP_TARGET_PNL" type="number"></label>
      <label class="fld"><span>TP poll secs</span><input id="c-TP_POLL_SECS" type="number" min="10"></label>
      <label class="fld" style="grid-column:1/-1"><span>&nbsp;</span><span class="hint" style="display:block" id="utc-evening"></span></label>
    </div>
  </div>
</div>

<div class="card">
  <div class="card-hd">Telegram Alerts</div>
  <div class="card-bd form-grid">
    <label class="fld"><span>Alerts</span>
      <select id="c-TELEGRAM_ALERTS"><option value="true">On</option><option value="false">Off</option></select>
    </label>
    <label class="fld"><span>Bot token</span><input id="c-TELEGRAM_BOT_TOKEN" type="password" autocomplete="off"></label>
    <label class="fld"><span>Chat ID</span><input id="c-TELEGRAM_CHAT_ID"></label>
    <label class="fld"><span>&nbsp;</span><button class="btn secondary" onclick="testTelegram()">Send test message</button></label>
  </div>
</div>

<div class="btn-row">
  <button class="btn" onclick="saveConfig()" style="padding:10px 26px">💾 Save configuration</button>
  <span class="hint" style="align-self:center">The bot watches .env and reloads itself within ~30 s of a save.</span>
</div>
{% endblock %}

{% block scripts %}
<script>
const KEYS = ['DRY_RUN','STRADDLE_LOTS','STRIKE_STEP',
  'TELEGRAM_BOT_TOKEN','TELEGRAM_CHAT_ID','TELEGRAM_ALERTS','TP_TARGET_PNL','TP_POLL_SECS',
  'MORNING_ENABLED','MORNING_LOTS','MORNING_EXIT_ENABLED',
  'DYNAMIC_LOTS','TP_TARGET_PNL_MORNING','TP_POLL_SECS_MORNING','MAX_TRADES_PER_DAY'];

/* Times are edited in IST but the bot's .env stores UTC (IST = UTC+5:30). */
const TIME_FIELDS = {
  't-morning-entry': ['MORNING_H_UTC', 'MORNING_M_UTC'],
  't-morning-exit':  ['MORNING_EXIT_H_UTC', 'MORNING_EXIT_M_UTC'],
  't-evening-entry': ['ENTRY_H_UTC', 'ENTRY_M_UTC'],
  't-evening-exit':  ['EXIT_H_UTC', 'EXIT_M_UTC'],
};
const pad = n => String(n).padStart(2, '0');
const utcToIstHHMM = (h, m) => {
  const t = (h * 60 + m + 330) % 1440;
  return `${pad(Math.floor(t / 60))}:${pad(t % 60)}`;
};
const istHHMMToUtc = v => {
  const [h, m] = v.split(':').map(Number);
  const t = (h * 60 + m - 330 + 1440) % 1440;
  return [Math.floor(t / 60), t % 60];
};

function dryBanner() {
  const on = document.getElementById('c-DRY_RUN').value === 'true';
  document.getElementById('dry-banner').style.display = on ? 'flex' : 'none';
}

function utcHints() {
  const utcOf = id => {
    const v = document.getElementById(id).value;
    if (!v) return '—';
    const [h, m] = istHHMMToUtc(v);
    return `${pad(h)}:${pad(m)}`;
  };
  document.getElementById('utc-morning').textContent =
    `UTC: entry ${utcOf('t-morning-entry')} · exit ${utcOf('t-morning-exit')}`;
  document.getElementById('utc-evening').textContent =
    `UTC equivalents: entry ${utcOf('t-evening-entry')} · exit ${utcOf('t-evening-exit')}`;
}

async function loadConfig() {
  const cfg = await jget('/api/config');
  for (const k of KEYS) {
    const el = document.getElementById('c-' + k);
    if (!el) continue;
    let v = (cfg[k] ?? '').toString().trim();
    if (el.tagName === 'SELECT') v = ['1','true','yes'].includes(v.toLowerCase()) ? 'true' : 'false';
    el.value = v;
  }
  for (const [id, [hk, mk]] of Object.entries(TIME_FIELDS)) {
    const h = parseInt(cfg[hk], 10), m = parseInt(cfg[mk], 10);
    if (!isNaN(h) && !isNaN(m)) document.getElementById(id).value = utcToIstHHMM(h, m);
  }
  dryBanner();
  utcHints();
}

async function saveConfig() {
  const body = {};
  for (const k of KEYS) {
    const el = document.getElementById('c-' + k);
    if (el && el.value !== '') body[k] = el.value;
  }
  for (const [id, [hk, mk]] of Object.entries(TIME_FIELDS)) {
    const v = document.getElementById(id).value;
    if (!v) continue;
    const [h, m] = istHHMMToUtc(v);
    body[hk] = String(h);
    body[mk] = String(m);
  }
  const d = await jpost('/api/config', body);
  if (d.ok) toast('Configuration saved — bot reloads within ~30 s' +
                  (d.tp_restarted?.length ? ` (TP restarted: ${d.tp_restarted.join(', ')})` : ''), 'ok');
  else toast('Save failed', 'err');
}

async function testTelegram() {
  const d = await jpost('/api/test-telegram');
  if (d.ok) toast('Test message sent — check Telegram', 'ok');
  else toast('Telegram test failed: ' + (d.error || ''), 'err');
}

document.addEventListener('input', e => { if ((e.target.id || '').startsWith('t-')) utcHints(); });
loadConfig();
</script>
{% endblock %}
